name: Deploy Jobs

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - nonprod

permissions:
  id-token: write # Required for OIDC authentication with Azure
  contents: read
  issues: write

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ENVIRONMENT: ${{ inputs.environment || 'prod' }}

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'prod' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Azure CLI Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: '22.x'

    - name: Build Project
      run: |
        npm install 
        npm run build
        npm prune --omit=dev

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Get Terrform Outputs
      id: tf-outputs
      run: |
        terraform init -backend-config="key=alkanes-${{ env.ENVIRONMENT }}.tfstate"
        echo "function_app_name=$(terraform output -raw function_app_name)" >> $GITHUB_OUTPUT

    - name: Deploy Function App
      uses: Azure/functions-action@v1
      with:
        app-name: ${{ steps.tf-outputs.outputs.function_app_name }}
