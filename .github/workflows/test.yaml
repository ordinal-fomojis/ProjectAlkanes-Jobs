name: Run Tests
on: [pull_request, workflow_dispatch]

jobs:
  validate-build:
    runs-on: ubuntu-latest
    environment: Preview
          
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22.x
        cache: 'npm'
  
    - name: Install dependencies
      run: npm install

    - name: Validate Test Typescript
      run: tsc -p tests

    - name: Lint
      run: npm run lint -- --max-warnings 0

    - name: Build
      run: npm run build

    - name: Test
      run: npm test
