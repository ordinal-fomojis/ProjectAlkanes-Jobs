name: Run Tests
on: [pull_request, workflow_dispatch]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'npm'
  
    - name: Install dependencies
      run: npm install

    - name: Validate Test Typescript
      run: tsc -p tests

    - name: Lint
      run: npm run lint -- --max-warnings 0

    - name: Build
      run: npm run build

    - name: Test
      run: npm test
